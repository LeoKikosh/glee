<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glee</title>
  <link rel="stylesheet" href="css/style.min.css">
</head>

<body>

  <header class="header">
    <div class="container-l">
      <div class="header__inner">
        <a class="logo" href="#">
          <img class="logo__img" src="images/logo.svg" alt="logo">
          <span class="logo__text">Glee.</span>
        </a>

        <nav class="menu">
          <ul class="menu__list">
            <li class="menu__item">
              <a class="menu__link" href="#">
                Home +
              </a>
            </li>
            <li class="menu__item">
              <a class="menu__link" href="#">
                About
              </a>
            </li>
            <li class="menu__item">
              <a class="menu__link" href="#">
                Services
              </a>
            </li>
            <li class="menu__item">
              <a class="menu__link" href="#">
                Pages +
              </a>
            </li>
            <li class="menu__item">
              <a class="menu__link" href="#">
                News
              </a>
            </li>
            <li class="menu__item">
              <a class="menu__link" href="#">
                Contact
              </a>
            </li>
          </ul>
        </nav>

        <div class="user-control">
          <button class="user-control__search">
            <img class="user-control__img" src="images/icons/search.svg" alt="search icon">
          </button>
          <div class="user-control__combination">
            <button class="user-control__heart">
              <img class="user-control__img" src="images/icons/heart.svg" alt="heart icon">
              <div class="user-control__num">0</div>
            </button>
            <button class="user-control__basket">
              <img class="user-control__img" src="images/icons/basket.svg" alt="basket icon">
              <div class="user-control__num">0</div>
            </button>
          </div>
          <button class="user-control__dots">
            <img class="user-control__img" src="images/icons/dots.svg" alt="dots icon">
          </button>
        </div>
      </div>
    </div>
  </header>

  <scriptп src="js/main.min.js">
    </script>
</body>

</html>
